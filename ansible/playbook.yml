---
- name: Configure Fabric VM (base environment)
  hosts: local
  become: true   # root (sudo)

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - apt-transport-https
          - software-properties-common
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Add azureuser to the docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Install MicroK8s (via snap)
      snap:
        name: microk8s
        classic: yes
        state: present

    - name: Add azureuser to the microk8s group
      user:
        name: azureuser
        groups: microk8s
        append: yes

    - name: Enable core MicroK8s addons
      command: microk8s enable dns storage
      register: addon_result
      changed_when: "'already enabled' not in addon_result.stdout"