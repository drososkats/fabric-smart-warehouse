---
- name: Configure Fabric VM (base environment)
  hosts: local
  become: true   # root (sudo)

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - apt-transport-https
          - software-properties-common
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Add azureuser to the docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Install MicroK8s (via snap)
      snap:
        name: microk8s
        classic: yes
        state: present

    - name: Add azureuser to the microk8s group
      user:
        name: azureuser
        groups: microk8s
        append: yes

    - name: Enable core MicroK8s addons
      command: microk8s enable dns storage
      register: addon_result
      changed_when: "'already enabled' not in addon_result.stdout"

    - name: Add HashiCorp Helm repository
      command: microk8s helm3 repo add hashicorp https://helm.releases.hashicorp.com
      become_user: azureuser
      register: helm_repo_result
      changed_when: "'already exists' not in helm_repo_result.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: microk8s helm3 repo update
      become_user: azureuser

    - name: Install Vault via Helm (dev mode, exposed as NodePort)
      command: >
        microk8s helm3 upgrade --install vault hashicorp/vault
        --set "server.dev.enabled=true"
        --set "server.service.type=NodePort"
        --set "server.service.nodePort=30820"
      become_user: azureuser
      register: vault_install_result
      changed_when: "'upgraded' in vault_install_result.stdout or 'installed' in vault_install_result.stdout"
    
    - name: Wait for Vault pod to be ready
      command: microk8s kubectl wait --for=condition=ready pod/vault-0 --timeout=120s
      become_user: azureuser
      changed_when: false

    - name: Store application secrets in Vault
      command: >
        microk8s kubectl exec vault-0 -- vault kv put secret/fabric
        mongo_uri="{{ vault_mongo_uri }}"
        minio_access_key="{{ vault_minio_access_key }}"
        minio_secret_key="{{ vault_minio_secret_key }}"
      environment:
        VAULT_ADDR: "http://127.0.0.1:8200"
        VAULT_TOKEN: "root"
      become_user: azureuser
      changed_when: true

    - name: Enable Kubernetes auth method in Vault
      command: microk8s kubectl exec vault-0 -- vault auth enable kubernetes
      become_user: azureuser
      register: auth_enable_result
      failed_when: false
      changed_when: "'Success' in auth_enable_result.stdout"

    - name: Configure Kubernetes auth in Vault
      shell: >
        microk8s kubectl exec vault-0 -- sh -c
        'vault write auth/kubernetes/config
        kubernetes_host="https://$KUBERNETES_SERVICE_HOST:443"
        token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
        kubernetes_ca_cert="@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"'
      become_user: azureuser
      changed_when: true

    - name: Write Vault policy for backend
      shell: |
        echo 'path "secret/data/fabric" { capabilities = ["read"] }' | microk8s kubectl exec -i vault-0 -- vault policy write fabric-policy -
      become_user: azureuser
      changed_when: true

    - name: Create Vault Kubernetes role for backend
      command: >
        microk8s kubectl exec vault-0 -- vault write auth/kubernetes/role/fabric-backend
        bound_service_account_names=default
        bound_service_account_namespaces=default
        policies=fabric-policy
        ttl=24h
      become_user: azureuser
      changed_when: true
    
    - name: Enable metrics-server addon
      command: microk8s enable metrics-server
      become_user: azureuser
      register: metrics_result
      changed_when: "'already enabled' not in metrics_result.stdout"
    
    - name: Add Prometheus community Helm repository
      command: microk8s helm3 repo add prometheus-community https://prometheus-community.github.io/helm-charts
      become_user: azureuser
      register: prom_repo_result
      changed_when: "'already exists' not in prom_repo_result.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: microk8s helm3 repo update
      become_user: azureuser

    - name: Install or upgrade kube-prometheus-stack (Prometheus + Grafana)
      command: >
        microk8s helm3 upgrade --install monitoring prometheus-community/kube-prometheus-stack
        --set "grafana.service.type=NodePort"
        --set "grafana.service.nodePort=30300"
        --set "prometheus.service.type=NodePort"
        --set "prometheus.service.nodePort=30909"
        --set "grafana.adminPassword=admin123"
        --set "grafana.sidecar.dashboards.enabled=false"
        --set "grafana.sidecar.datasources.enabled=false"
        --set "grafana.persistence.enabled=true"
        --set "grafana.persistence.size=1Gi"
      become_user: azureuser
      register: prom_install_result
      changed_when: "'upgraded' in prom_install_result.stdout or 'installed' in prom_install_result.stdout"

    - name: Add Jenkins Helm repository
      command: microk8s helm3 repo add jenkins https://charts.jenkins.io
      become_user: azureuser
      register: jenkins_repo_result
      changed_when: "'already exists' not in jenkins_repo_result.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: microk8s helm3 repo update
      become_user: azureuser

    - name: Install or upgrade Jenkins via Helm
      command: >
        microk8s helm3 upgrade --install jenkins jenkins/jenkins
        --set "controller.serviceType=NodePort"
        --set "controller.nodePort=30808"
        --set "controller.admin.password=admin123"
        --set "controller.sidecars.configAutoReload.enabled=false"
      become_user: azureuser
      register: jenkins_install_result
      changed_when: "'upgraded' in jenkins_install_result.stdout or 'installed' in jenkins_install_result.stdout"

    - name: Add ArgoCD Helm repository
      command: microk8s helm3 repo add argo https://argoproj.github.io/argo-helm
      become_user: azureuser
      register: argo_repo_result
      changed_when: "'already exists' not in argo_repo_result.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: microk8s helm3 repo update
      become_user: azureuser

    - name: Install or upgrade ArgoCD via Helm
      command: >
        microk8s helm3 upgrade --install argocd argo/argo-cd
        --set "server.service.type=NodePort"
        --set "server.service.nodePortHttp=30880"
        --set "configs.params.server\.insecure=true"
      become_user: azureuser
      register: argocd_install_result
      changed_when: "'upgraded' in argocd_install_result.stdout or 'installed' in argocd_install_result.stdout"