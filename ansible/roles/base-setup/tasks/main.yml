- name: Update apt package cache
  apt:
    update_cache: yes
    cache_valid_time: "{{ base_setup_apt_cache_valid_time }}"

- name: Install base dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - apt-transport-https
      - software-properties-common
    state: present

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Add user to the docker group
  user:
    name: "{{ base_setup_user }}"
    groups: docker
    append: yes

- name: Install MicroK8s (via snap)
  snap:
    name: microk8s
    classic: yes
    state: present

- name: Add user to the microk8s group
  user:
    name: "{{ base_setup_user }}"
    groups: microk8s
    append: yes

- name: Enable core MicroK8s addons
  command: "microk8s enable {{ base_setup_microk8s_addons }}"
  register: addon_result
  changed_when: "'already enabled' not in addon_result.stdout"

- name: Ensure keyrings directory exists for k6
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download and dearmor k6 GPG key
  shell: |
    curl -fsSL https://dl.k6.io/key.gpg | gpg --dearmor | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg > /dev/null
    chmod 644 /usr/share/keyrings/k6-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/k6-archive-keyring.gpg

- name: Add k6 APT repository
  apt_repository:
    repo: "{{ base_setup_k6_repo_url }}"
    state: present
    filename: k6

- name: Install k6
  apt:
    name: k6
    state: present
    update_cache: yes

- name: Install Node.js 20.x
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node