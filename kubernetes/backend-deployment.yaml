apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabric-backend
  labels:
    app: fabric-backend
    tier: backend
    env: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabric-backend
  template:
    metadata:
      labels:
       app: fabric-backend
       tier: backend
       env: development
    spec:
      containers:
      - name: backend
        image: katsdros/fabric-backend:v2
        imagePullPolicy: Always
        securityContext:             
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 5000
        env:
        # internal settings
        - name: PORT
          value: "5000"
        - name: RABBITMQ_URI
          value: "amqp://guest:guest@rabbitmq-service:5672"
        - name: MINIO_ENDPOINT
          value: "minio-service"
        - name: MINIO_PORT
          value: "9000"
        - name: MINIO_ACCESS_KEY
          value: "admin"
        - name: MINIO_SECRET_KEY
          value: "password123"
        
        # bucket name
        - name: MINIO_BUCKET
          value: "products"

        # external access
        - name: VM_IP
          value: "20.188.60.198"

        # database
        - name: MONGO_URI
          value: "mongodb+srv://drosos_db_user:noo3aoSHj9cHVKdA@clusterfabric.j48pc5f.mongodb.net/fabricDB?retryWrites=true&w=majority"
        - name: appName
          value: "ClusterFabric"
---
apiVersion: v1
kind: Service
metadata:
  name: fabric-backend-service
spec:
  selector:
    app: fabric-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: NodePort
